<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563EB">
    <meta name="application-name" content="Captana Ground Truth">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Captana GT">
    <link rel="apple-touch-icon" href="icons/icon-180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <title>Captana — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: #F2F3F7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; color: #111827; }
        .shell { width: 100%; max-width: 390px; min-height: 100vh; background: #F2F3F7; display: flex; flex-direction: column; padding: 0 20px; }

        .brand-area { padding-top: 64px; text-align: center; animation: fadeUp .4s ease both; }
        .logo-wrap { margin: 0 auto; }
        .logo-img { width: 132px; height: auto; display: block; margin: 0 auto; }
        .brand-byline { display: inline-flex; align-items: center; gap: 7px; margin-top: 14px; }
        .byline-mark { width: 20px; height: 20px; border: 1.5px solid #94A3B8; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #64748B; line-height: 1; }
        .byline-text { font-size: 16px; font-weight: 500; color: #64748B; }
        .brand-sub { font-size: 14px; color: #6B7280; font-weight: 500; margin-top: 18px; line-height: 1.5; }

        .card { margin-top: 36px; background: #fff; border-radius: 22px; padding: 24px 22px; box-shadow: 0 2px 14px rgba(0,0,0,0.06); animation: fadeUp .4s .08s ease both; opacity: 0; }
        .field { margin-bottom: 16px; }
        .field-label { font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .4px; }
        .input-wrap { position: relative; }
        .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); pointer-events: none; }
        .input-icon svg { width: 17px; height: 17px; color: #9CA3AF; }
        .text-input { width: 100%; padding: 14px 16px 14px 44px; background: #F9FAFB; border: 1.5px solid #E5E7EB; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; color: #111827; outline: none; transition: border-color .2s, background .2s; }
        .text-input:focus { border-color: #2563EB; background: #fff; }
        .text-input::placeholder { color: #9CA3AF; }
        .text-input.error { border-color: #EF4444; background: #FEF2F2; }
        .field-error { font-size: 12px; font-weight: 600; color: #EF4444; margin-top: 6px; min-height: 14px; }

        .pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 6px; color: #9CA3AF; }
        .pw-toggle svg { width: 18px; height: 18px; display: block; }

        .btn-primary { width: 100%; margin-top: 6px; padding: 16px; background: #2563EB; color: #fff; border: none; border-radius: 16px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 14px rgba(37,99,235,0.3); transition: transform .15s; }
        .btn-primary:active { transform: scale(.975); }
        .btn-primary svg { width: 18px; height: 18px; }

        .footnote { text-align: center; font-size: 12px; color: #9CA3AF; font-weight: 500; margin-top: 22px; line-height: 1.5; }

        .test-area { text-align: center; margin-top: 18px; }
        .btn-test { display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px; background: #fff; border: 1.5px solid #E5E7EB; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; color: #6B7280; cursor: pointer; transition: transform .15s, border-color .15s; }
        .btn-test:active { transform: scale(.97); }
        .btn-test.busy { pointer-events: none; opacity: .7; }
        .btn-test svg { width: 15px; height: 15px; }
        .test-result { font-size: 12px; font-weight: 600; margin-top: 10px; min-height: 16px; line-height: 1.5; padding: 0 20px; }
        .test-result.ok { color: #16A34A; }
        .test-result.warn { color: #B45309; }
        .version-stamp { text-align: center; font-size: 11px; font-weight: 600; color: #C0C4CC; margin-top: 24px; padding-bottom: 20px; letter-spacing: .3px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
<div id="errBanner" style="display:none; background:#FEF2F2; color:#B91C1C; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; padding:10px 14px; text-align:center; line-height:1.4; border-bottom:1px solid #FECACA;"></div>
<div class="shell">
    <div class="brand-area">
        <div class="logo-wrap">
            <img class="logo-img" src="img/captana-logo.png" alt="Captana by Vusion">
        </div>
        <div class="brand-byline">
            <span class="byline-mark">V</span>
            <span class="byline-text">by Vusion</span>
        </div>
        <div class="brand-sub">Sign in to begin recording ground truth.</div>
    </div>

    <div class="card">
        <div class="field">
            <div class="field-label">Email</div>
            <div class="input-wrap">
                <div class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
                <input class="text-input" id="emailInput" type="email" inputmode="email" placeholder="you@example.com" autocomplete="email" autocapitalize="off" spellcheck="false">
            </div>
            <div class="field-error" id="emailError"></div>
        </div>

        <div class="field">
            <div class="field-label">Password</div>
            <div class="input-wrap">
                <div class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
                <input class="text-input" id="pwInput" type="password" placeholder="At least 6 characters" autocomplete="current-password" style="padding-right:44px;">
                <button class="pw-toggle" id="pwToggle" type="button" aria-label="Show password">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
            <div class="field-error" id="pwError"></div>
        </div>

        <button class="btn-primary" id="signInBtn" onclick="signIn()">
            Sign In
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
    </div>

    <div class="footnote">Your email is recorded with each ground-truth entry.</div>

    <div class="test-area">
        <button class="btn-test" id="testBtn" onclick="testConnection()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            Test sheet connection
        </button>
        <div class="test-result" id="testResult"></div>
    </div>

    <div class="version-stamp">v0.11.0 · build 2026-06-02</div>
</div>

<script src="app.js"></script>
<script>
    // Visible error catcher — surfaces any JS error that would otherwise fail silently.
    window.addEventListener('error', function (ev) {
        var b = document.getElementById('errBanner');
        if (b) { b.style.display = 'block'; b.textContent = 'JS error: ' + (ev.message || 'unknown') + (ev.filename ? ' (' + ev.filename.split('/').pop() + ':' + ev.lineno + ')' : ''); }
    });
    // Confirm app.js actually loaded by checking for a known export.
    window.addEventListener('load', function () {
        var b = document.getElementById('errBanner');
        if (typeof saveRecord === 'undefined' || typeof GOOGLE_SHEET_ENDPOINT === 'undefined') {
            if (b) { b.style.display = 'block'; b.textContent = 'app.js did not load (try a hard refresh — old cache).'; }
        } else if (!GOOGLE_SHEET_ENDPOINT) {
            if (b) { b.style.display = 'block'; b.textContent = 'app.js loaded but endpoint is empty (old cached app.js — hard refresh).'; }
        }
    });
</script>
<script>
    const EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    const emailInput = document.getElementById('emailInput');
    const pwInput = document.getElementById('pwInput');
    const emailError = document.getElementById('emailError');
    const pwError = document.getElementById('pwError');

    // Pre-fill if returning
    emailInput.value = Session.get('email');

    document.getElementById('pwToggle').addEventListener('click', () => {
        pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
    });

    [emailInput, pwInput].forEach(el => {
        el.addEventListener('input', () => { el.classList.remove('error'); emailError.textContent = ''; pwError.textContent = ''; });
        el.addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });
    });

    function signIn() {
        const email = emailInput.value.trim();
        const pw = pwInput.value;
        let valid = true;

        if (!EMAIL_REGEX.test(email)) {
            emailInput.classList.add('error');
            emailError.textContent = 'Enter a valid email address.';
            valid = false;
        }
        if (pw.length < 6) {
            pwInput.classList.add('error');
            pwError.textContent = 'Password must be at least 6 characters.';
            valid = false;
        }
        if (!valid) return;

        // No user database — we only record the email as metadata.
        Session.set('email', email);
        window.location.href = 'store_type.html';
    }

    async function testConnection() {
        const btn = document.getElementById('testBtn');
        const result = document.getElementById('testResult');
        result.className = 'test-result';
        result.textContent = '';

        if (!GOOGLE_SHEET_ENDPOINT) {
            result.className = 'test-result warn';
            result.textContent = 'No sheet endpoint set in app.js yet.';
            return;
        }

        const original = btn.innerHTML;
        btn.classList.add('busy');
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Sending test row…';

        const testRecord = {
            timestamp: new Date().toISOString(),
            email: 'connection-test@captana',
            storeType: 'TEST',
            storeAddress: 'TEST ROW — safe to delete',
            cameraBarcode: 'TEST',
            outOfShelfBarcode: 'TEST',
            rootCause: 'Connection test',
        };

        try {
            const res = await saveRecord(testRecord);
            result.className = 'test-result ok';
            result.innerHTML = 'Test request fired (queued: ' + res.queued + '). Now check the GroundTruth tab for a row marked “TEST”. If it’s there, you’re wired up. If not, the endpoint URL or “Anyone” access is the issue.';
        } catch (e) {
            result.className = 'test-result warn';
            result.textContent = 'Error: ' + (e && e.message ? e.message : String(e));
        } finally {
            btn.classList.remove('busy');
            btn.innerHTML = original;
        }
    }</script>
</body>
</html>
