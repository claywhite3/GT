<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563EB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icons/icon-180.png">
    <title>Captana — Root Cause</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: #F2F3F7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; color: #111827; }
        .shell { width: 100%; max-width: 390px; min-height: 100vh; background: #F2F3F7; display: flex; flex-direction: column; padding-bottom: 168px; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 16px 20px 8px; }
        .top-bar-right { display: flex; align-items: center; gap: 8px; }
        .context-chip { background: #EFF6FF; border: 1.5px solid #BFDBFE; border-radius: 10px; padding: 6px 10px; font-size: 13px; font-weight: 800; color: #2563EB; line-height: 1; min-height: 28px; display: flex; align-items: center; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .back-btn { width: 38px; height: 38px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: none; cursor: pointer; text-decoration: none; }
        .back-btn svg { width: 18px; height: 18px; color: #111827; }
        .avatar { width: 40px; height: 40px; background: #2563EB; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; }

        .hero { padding: 12px 20px 0; animation: fadeUp .4s ease both; }
        .eyebrow { font-size: 11px; font-weight: 700; color: #2563EB; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
        .hero-title { font-size: 24px; font-weight: 800; color: #111827; line-height: 1.2; }
        .hero-sub { font-size: 14px; color: #6B7280; font-weight: 500; margin-top: 4px; line-height: 1.5; }

        .oos-tag { display: inline-flex; align-items: center; gap: 6px; margin: 12px 20px 0; padding: 8px 12px; background: #fff; border: 1.5px solid #E5E7EB; border-radius: 12px; font-size: 12px; font-weight: 700; color: #374151; }
        .oos-tag svg { width: 14px; height: 14px; color: #2563EB; }
        .oos-tag .mono { font-family: monospace; color: #111827; letter-spacing: .5px; }

        .grid { padding: 16px 20px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .cause-card { position: relative; background: #fff; border: 2px solid transparent; border-radius: 18px; padding: 18px 16px; cursor: pointer; min-height: 104px; display: flex; align-items: center; box-shadow: 0 6px 16px rgba(17,24,39,0.10), 0 2px 4px rgba(17,24,39,0.06); transition: border-color .16s, transform .12s, box-shadow .16s, background .16s; animation: fadeUp .35s ease both; }
        .cause-card:active { transform: translateY(1px) scale(.98); box-shadow: 0 3px 8px rgba(17,24,39,0.10); }
        .cause-card.selected { border-color: #2563EB; background: #F5F8FF; box-shadow: 0 10px 22px rgba(37,99,235,0.26), 0 2px 6px rgba(37,99,235,0.14); }
        .cause-check { position: absolute; top: 12px; right: 12px; width: 22px; height: 22px; border-radius: 50%; background: #2563EB; display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(.6); transition: opacity .15s, transform .15s; }
        .cause-card.selected .cause-check { opacity: 1; transform: scale(1); }
        .cause-check svg { width: 12px; height: 12px; color: #fff; }
        .cause-label { font-size: 14px; font-weight: 700; color: #111827; line-height: 1.3; }

        /* Bottom action stack */
        .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 390px; background: #fff; padding: 14px 20px calc(14px + env(safe-area-inset-bottom)); box-shadow: 0 -4px 20px rgba(0,0,0,0.08); border-top: 1px solid #F3F4F6; }
        .nav-row { display: flex; gap: 12px; }
        .btn-back { padding: 15px 20px; background: #fff; color: #6B7280; border: 1.5px solid #E5E7EB; border-radius: 16px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; text-decoration: none; transition: transform .15s; flex-shrink: 0; }
        .btn-back:active { transform: scale(.975); }
        .btn-back svg { width: 16px; height: 16px; }
        .btn-next-issue { flex: 1; padding: 15px; background: #2563EB; color: #fff; border: none; border-radius: 16px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 14px rgba(37,99,235,0.3); transition: transform .15s, opacity .15s; }
        .btn-next-issue:active { transform: scale(.975); }
        .btn-next-issue.disabled { opacity: .45; pointer-events: none; }
        .btn-next-issue svg { width: 18px; height: 18px; }

        .btn-alldone { width: 100%; margin-top: 10px; padding: 14px; background: #fff; color: #16A34A; border: 1.5px solid #BBF7D0; border-radius: 16px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform .15s, background .15s; }
        .btn-alldone:active { transform: scale(.985); background: #F0FDF4; }
        .btn-alldone.disabled { opacity: .45; pointer-events: none; }
        .btn-alldone svg { width: 17px; height: 17px; }

        /* Confirm dialog */
        .dialog-overlay { position: fixed; inset: 0; background: rgba(17,24,39,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity .2s; padding: 24px; }
        .dialog-overlay.open { opacity: 1; pointer-events: auto; }
        .dialog { width: 100%; max-width: 320px; background: #fff; border-radius: 22px; padding: 26px 22px 20px; text-align: center; transform: scale(.94); transition: transform .2s; }
        .dialog-overlay.open .dialog { transform: scale(1); }
        .dialog-icon { width: 56px; height: 56px; margin: 0 auto 14px; background: #F0FDF4; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .dialog-icon svg { width: 28px; height: 28px; color: #16A34A; }
        .dialog-title { font-size: 19px; font-weight: 800; color: #111827; }
        .dialog-text { font-size: 14px; color: #6B7280; font-weight: 500; margin-top: 6px; line-height: 1.5; }
        .dialog-actions { display: flex; gap: 10px; margin-top: 22px; }
        .dialog-cancel { flex: 1; padding: 14px; background: #F3F4F6; color: #374151; border: none; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
        .dialog-ok { flex: 1; padding: 14px; background: #16A34A; color: #fff; border: none; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 14px rgba(22,163,74,0.3); }

        /* Saving toast */
        .toast { position: fixed; bottom: 180px; left: 50%; transform: translateX(-50%) translateY(20px); background: #111827; color: #fff; font-size: 13px; font-weight: 600; padding: 12px 18px; border-radius: 12px; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 90; display: flex; align-items: center; gap: 8px; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast svg { width: 15px; height: 15px; }

        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
<div class="shell">
    <div class="top-bar">
        <a href="scan_oos.html" class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></a>
        <div class="top-bar-right">
            <div class="context-chip" id="cameraChip">Camera</div>
            <div class="avatar" id="avatarEl">GT</div>
        </div>
    </div>

    <div class="hero">
        <div class="eyebrow">Step 3 — Root Cause</div>
        <div class="hero-title">What's the Root Cause?</div>
        <div class="hero-sub">Select the single best reason for this out-of-shelf.</div>
    </div>

    <div class="oos-tag">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="8" width="20" height="8" rx="2"/><line x1="6" y1="11" x2="6" y2="13"/><line x1="10" y1="11" x2="10" y2="13"/><line x1="14" y1="11" x2="14" y2="13"/><line x1="18" y1="11" x2="18" y2="13"/></svg>
        OOS <span class="mono" id="oosChip">—</span>
    </div>

    <div class="grid" id="grid"></div>
</div>

<div class="bottom-bar">
    <div class="nav-row">
        <a href="scan_oos.html" class="btn-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>Back</a>
        <button class="btn-next-issue disabled" id="nextIssueBtn" onclick="saveAndNextIssue()">Next Issue <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>
    <button class="btn-alldone disabled" id="allDoneBtn" onclick="openConfirm()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        All Done with This Camera
    </button>
</div>

<!-- Confirm dialog -->
<div class="dialog-overlay" id="confirmOverlay" onclick="if(event.target===this)closeConfirm()">
    <div class="dialog">
        <div class="dialog-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
        <div class="dialog-title">All done with this camera?</div>
        <div class="dialog-text">This will save the current issue and take you back to scan the next camera.</div>
        <div class="dialog-actions">
            <button class="dialog-cancel" onclick="closeConfirm()">Not yet</button>
            <button class="dialog-ok" onclick="saveAndFinishCamera()">OK, done</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span id="toastText">Saved</span></div>

<script src="app.js"></script>
<script>
    Session.requireLogin();
    if (!Session.get('cameraBarcode') || !Session.get('oosBarcode')) {
        window.location.href = 'scan_camera.html';
    }

    document.getElementById('avatarEl').textContent = Session.initials();
    document.getElementById('cameraChip').textContent = Session.get('cameraBarcode', 'Camera');
    document.getElementById('oosChip').textContent = Session.get('oosBarcode', '\u2014');

    let selectedCause = null;

    const CHECK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = ROOT_CAUSES.map((cause, i) => {
            const sel = selectedCause === cause ? ' selected' : '';
            return `<div class="cause-card${sel}" style="animation-delay:${i * 0.03}s" onclick="selectCause(${i})">
                <div class="cause-check">${CHECK}</div>
                <div class="cause-label">${cause}</div>
            </div>`;
        }).join('');
    }

    function selectCause(i) {
        selectedCause = ROOT_CAUSES[i];   // single-select
        document.getElementById('nextIssueBtn').classList.remove('disabled');
        document.getElementById('allDoneBtn').classList.remove('disabled');
        renderGrid();
    }

    function showToast(text) {
        const t = document.getElementById('toast');
        document.getElementById('toastText').textContent = text;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 1400);
    }

    async function persistCurrent() {
        const record = Records.build({
            outOfShelfBarcode: Session.get('oosBarcode'),
            rootCause: selectedCause,
        });
        const res = await saveRecord(record);
        showToast(res.queued ? 'Saved locally (will sync)' : 'Saved \u2713');
    }

    // Save this issue, then loop back to scan another out-of-shelf for the SAME camera.
    async function saveAndNextIssue() {
        if (!selectedCause) return;
        await persistCurrent();
        Session.del('oosBarcode');     // keep cameraBarcode, clear the OOS
        setTimeout(() => { window.location.href = 'scan_oos.html'; }, 350);
    }

    function openConfirm() {
        if (!selectedCause) return;
        document.getElementById('confirmOverlay').classList.add('open');
    }
    function closeConfirm() {
        document.getElementById('confirmOverlay').classList.remove('open');
    }

    // Save this issue, then go back to the camera page for a new camera.
    async function saveAndFinishCamera() {
        await persistCurrent();
        Session.del('oosBarcode');
        Session.del('cameraBarcode');
        setTimeout(() => { window.location.href = 'scan_camera.html'; }, 350);
    }

    renderGrid();
</script>
</body>
</html>
